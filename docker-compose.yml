services:
  postgres:
    image: postgres:16-alpine
    container_name: mbd-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: mbd
      POSTGRES_PASSWORD: mbd_secure_2026
      POSTGRES_DB: mbd_solutions
    volumes:
      - mbd_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mbd -d mbd_solutions"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mbd_pg_data:
