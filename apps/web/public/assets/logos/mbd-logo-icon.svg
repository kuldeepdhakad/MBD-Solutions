    </linearGradient>
    <linearGradient id="blueInner" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#0b1f4a"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#fbbf24" flood-opacity="0.35"/>
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#1d4ed8" flood-opacity="0.45"/>
    </filter>
  </defs>
  <circle cx="256" cy="256" r="240" fill="url(#blueRing)" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="210" fill="none" stroke="url(#gold)" stroke-width="8"/>
